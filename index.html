<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dunia Juf</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #7ec0ee; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>
<script type="module">
    import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js';
    import { buatKarakterManusia } from './js/human_model/human_model.js';
    import { buatRumah } from './js/human_model/environment/house.js'; // Rumah masuk di sini

    // 1. SETUP SCENE & CAMERA
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x7ec0ee);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 2. LIGHTING (CAHAYA)
    const light = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(light);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    // 3. TANAH SEMENTARA
    const floorGeo = new THREE.PlaneGeometry(100, 100);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x556b2f });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // RUMAH BARU KAMU BERDIRI DI SINI:
    const rumahUtama = buatRumah();
    rumahUtama.position.set(0, 0, -6); 
    scene.add(rumahUtama);


                const manusia = buatKarakterManusia();
        scene.add(manusia);

        manusia.position.set(0, 0, 0);
        
        // Kamera dimajukan sedikit (Z = -0.05) agar pas di depan dada/mata player
        camera.position.set(0, 1.5, -0.05); 
        manusia.add(camera); 

        // Dorong posisi tangan ke depan dada agar selalu terlihat di layar HP
        if (manusia.userData.lenganKiri && manusia.userData.lenganKanan) {
            manusia.userData.lenganKiri.position.set(-0.25, 1.15, -0.2);
            manusia.userData.lenganKanan.position.set(0.25, 1.15, -0.2);
        }


        // 5. KONTROL SENTUHAN (Kiri = Jalan, Kanan = Nengok ala COD)
        let isTouching = false;
        let previousTouchX = 0, previousTouchY = 0;
        let rotasiY = 0, rotasiX = 0;
        let jalan = false; 
        let waktu = 0;

        window.addEventListener('touchstart', (e) => {
            isTouching = true;
            previousTouchX = e.touches[0].clientX;
            previousTouchY = e.touches[0].clientY;

            // JALAN MAJU: Hanya aktif kalau menyentuh layar sebelah kiri (kurang dari setengah lebar layar)
            if (e.touches[0].clientX < window.innerWidth / 2) {
                jalan = true;
            }
        });

        window.addEventListener('touchmove', (e) => {
            if (!isTouching) return;
            
            // PANDANGAN KAMERA: Hanya aktif kalau menggeser di layar sebelah kanan (lebih dari setengah lebar layar)
            if (e.touches[0].clientX > window.innerWidth / 2) {
                const deltaX = e.touches[0].clientX - previousTouchX;
                const deltaY = e.touches[0].clientY - previousTouchY;
                
                rotasiY -= deltaX * 0.002; // Sensitivitas kamera dibuat mulus
                rotasiX -= deltaY * 0.002;
                
                // Batasi sudut pandang atas/bawah agar tidak pusing
                rotasiX = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, rotasiX));
                
                manusia.rotation.y = rotasiY;
                camera.rotation.x = rotasiX;
            }

            previousTouchX = e.touches[0].clientX;
            previousTouchY = e.touches[0].clientY;
        });

        window.addEventListener('touchend', () => {
            isTouching = false;
            jalan = false; // Angkat jempol = otomatis berhenti jalan
        });

        // 6. ANIMATION LOOP (Gerak & Ayunan Tangan)
        function animate() {
            requestAnimationFrame(animate);

            if (jalan) {
                manusia.translateZ(-0.04); // Jalankan karakter maju
                waktu += 0.15; // Ayunan tangan saat jalan
            } else {
                waktu += 0.02; // Ayunan halus saat diam (efek bernapas)
            }

            if (manusia.userData.lenganKanan && manusia.userData.lenganKiri) {
                const ayunan = Math.sin(waktu) * (jalan ? 0.2 : 0.02);
                manusia.userData.lenganKanan.rotation.x = 0.1 + ayunan;
                manusia.userData.lenganKiri.rotation.x = 0.1 - ayunan;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
