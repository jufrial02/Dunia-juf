<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dunia Juf</title>
<style>
body{margin:0;overflow:hidden;background:#87CEEB;touch-action:none}
canvas{display:block}
#crosshair{position:absolute;top:50%;left:50%;width:6px;height:6px;background:#fff;border-radius:50%;transform:translate(-50%,-50%);opacity:.7}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div id="crosshair"></div>
<script>
// Versi fondasi Dunia Juf.
// Salin logika tangan, kontrol sentuh, dan animasi dari index lama ke sini.
// File ini adalah fondasi bersih agar proyek tidak lagi tercampur.

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87CEEB);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const player=new THREE.Group();
scene.add(player);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,1.6,0);
player.add(camera);

scene.add(new THREE.AmbientLight(0xffffff,0.5));
const sun=new THREE.DirectionalLight(0xffffff,1);
sun.position.set(5,10,5);
scene.add(sun);

const ground=new THREE.Mesh(
 new THREE.PlaneGeometry(100,100),
 new THREE.MeshStandardMaterial({color:0x4CAF50})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

const torso=new THREE.Mesh(
 new THREE.BoxGeometry(0.45,0.65,0.25),
 new THREE.MeshStandardMaterial({color:0x444444})
);
torso.position.set(0,1.1,0);
player.add(torso);

const house=new THREE.Mesh(
 new THREE.BoxGeometry(3,3,3),
 new THREE.MeshStandardMaterial({color:0x8B4513})
);
house.position.set(0,1.5,-5);
scene.add(house);

function animate(){
 requestAnimationFrame(animate);
 renderer.render(scene,camera);
}
animate();

addEventListener("resize",()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
