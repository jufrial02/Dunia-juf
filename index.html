<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dunia Juf</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #7ec0ee; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>
<script type="module">
import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js';
import { buatKarakterManusia } from './js/human_model/human_model.js';
import { buatRumah } from './js/human_model/environment/house.js';
import { buatPohon } from 'js/komponen.js';



    // 1. SETUP SCENE & CAMERA
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x7ec0ee);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 2. LIGHTING (CAHAYA)
    const light = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(light);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    // 3. TANAH SEMENTARA
    const floorGeo = new THREE.PlaneGeometry(100, 100);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x556b2f });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // RUMAH BARU KAMU BERDIRI DI SINI:
    const rumahUtama = buatRumah();
    rumahUtama.position.set(0, 0, -6); 
    scene.add(rumahUtama);

    // MENANAM POHON DARI FILE JS/KOMPONEN.JS
const pohon1 = buatPohon(); pohon1.position.set(-4, 0, -8); scene.add(pohon1);
const pohon2 = buatPohon(); pohon2.position.set(4, 0, -7);  scene.add(pohon2);
const pohon3 = buatPohon(); pohon3.position.set(-5, 0, -4); scene.add(pohon3);
    

                const manusia = buatKarakterManusia();
        scene.add(manusia);

        manusia.position.set(0, 0, 0);
        
        // Kamera dimajukan sedikit (Z = -0.05) agar pas di depan dada/mata player
        camera.position.set(0, 1.5, -0.05); 
        manusia.add(camera); 

        // Dorong posisi tangan ke depan dada agar selalu terlihat di layar HP
        if (manusia.userData.lenganKiri && manusia.userData.lenganKanan) {
            manusia.userData.lenganKiri.position.set(-0.25, 1.15, -0.2);
            manusia.userData.lenganKanan.position.set(0.25, 1.15, -0.2);
        }


        // 5. KONTROL MULTI-TOUCH HP (Bisa Jalan + Nengok Bersamaan ala COD)
        let rotasiY = 0, rotasiX = 0;
        let jalan = false; 
        let waktu = 0;
        
        let touchJalanId = null;
        let touchKameraId = null;
        let previousTouchX = 0, previousTouchY = 0;

        window.addEventListener('touchstart', (e) => {
            // Periksa setiap jari yang baru menempel di layar
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                
                // Jari di sebelah KIRI layar = JALAN
                if (touch.clientX < window.innerWidth / 2 && touchJalanId === null) {
                    touchJalanId = touch.identifier;
                    jalan = true;
                } 
                // Jari di sebelah KANAN layar = KAMERA
                else if (touch.clientX >= window.innerWidth / 2 && touchKameraId === null) {
                    touchKameraId = touch.identifier;
                    previousTouchX = touch.clientX;
                    previousTouchY = touch.clientY;
                }
            }
        });

        window.addEventListener('touchmove', (e) => {
            // Periksa jari mana yang sedang bergerak
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                
                // Jika jari yang bergerak adalah jari kamera (Kanan)
                if (touch.identifier === touchKameraId) {
                    const deltaX = touch.clientX - previousTouchX;
                    const deltaY = touch.clientY - previousTouchY;
                    
                    rotasiY -= deltaX * 0.002; // Sensitivitas kamera
                    rotasiX -= deltaY * 0.002;
                    rotasiX = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, rotasiX));
                    
                    manusia.rotation.y = rotasiY;
                    camera.rotation.x = rotasiX;
                    
                    previousTouchX = touch.clientX;
                    previousTouchY = touch.clientY;
                }
            }
        });

        window.addEventListener('touchend', (e) => {
            // Periksa jari mana yang diangkat dari layar
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                
                if (touch.identifier === touchJalanId) {
                    touchJalanId = null;
                    jalan = false; // Berhenti jalan jika jempol kiri diangkat
                }
                if (touch.identifier === touchKameraId) {
                    touchKameraId = null;
                }
            }
        });

        // 6. ANIMATION LOOP (Gerak & Ayunan Tangan)
        function animate() {
            requestAnimationFrame(animate);

            if (jalan) {
                manusia.translateZ(-0.04); // Kecepatan jalan maju
                waktu += 0.15;
            } else {
                waktu += 0.02;
            }

            if (manusia.userData.lenganKanan && manusia.userData.lenganKiri) {
                const ayunan = Math.sin(waktu) * (jalan ? 0.2 : 0.02);
                manusia.userData.lenganKanan.rotation.x = 0.1 + ayunan;
                manusia.userData.lenganKiri.rotation.x = 0.1 - ayunan;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
