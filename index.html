<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dunia Juf</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #7ec0ee; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>
<script type="module">
    import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js';
    import { buatKarakterManusia } from './js/human_model/human_model.js';
    import { buatRumah } from './js/human_model/environment/house.js'; // Rumah masuk di sini

    // 1. SETUP SCENE & CAMERA
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x7ec0ee);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 2. LIGHTING (CAHAYA)
    const light = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(light);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    // 3. TANAH SEMENTARA
    const floorGeo = new THREE.PlaneGeometry(100, 100);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x556b2f });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // RUMAH BARU KAMU BERDIRI DI SINI:
    const rumahUtama = buatRumah();
    rumahUtama.position.set(0, 0, -6); 
    scene.add(rumahUtama);


        const rumahGeo = new THREE.BoxGeometry(2, 2, 2);
        const rumahMat = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
        const rumah = new THREE.Mesh(rumahGeo, rumahMat);
        rumah.position.set(0, 1, -5);
        scene.add(rumah);

        // 4. PANGGIL MODEL MANUSIA UTUH
        const manusia = buatKarakterManusia();
        scene.add(manusia);

        // Kamera ditempatkan sebagai mata karakter
        manusia.position.set(0, 0, 0);
        camera.position.set(0, 1.4, 0); 
        manusia.add(camera); 

        // 5. KONTROL SENTUHAN HP (Look & Move)
        let isTouching = false;
        let previousTouchX = 0, previousTouchY = 0;
        let rotasiY = 0, rotasiX = 0;
        let kecepatanJalan = 0;

        window.addEventListener('touchstart', (e) => {
            isTouching = true;
            previousTouchX = e.touches[0].clientX;
            previousTouchY = e.touches[0].clientY;
            kecepatanJalan = 0.05; // Mulai jalan maju saat layar disentuh
        });

        window.addEventListener('touchmove', (e) => {
            if (!isTouching) return;
            const deltaX = e.touches[0].clientX - previousTouchX;
            const deltaY = e.touches[0].clientY - previousTouchY;

            rotasiY -= deltaX * 0.005;
            rotasiX -= deltaY * 0.005;
            rotasiX = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, rotasiX));

            manusia.rotation.y = rotasiY;
            camera.rotation.x = rotasiX;

            previousTouchX = e.touches[0].clientX;
            previousTouchY = e.touches[0].clientY;
        });

        window.addEventListener('touchend', () => {
            isTouching = false;
            kecepatanJalan = 0; // Berhenti jalan saat sentuhan dilepas
        });

        // 6. ANIMATION LOOP (Gerak & Render)
        let waktu = 0;
        function animate() {
            requestAnimationFrame(animate);

            // Sistem gerak maju sesuai arah hadap kamera
            if (kecepatanJalan > 0) {
                manusia.translateZ(-kecepatanJalan);
                waktu += 0.15;
            } else {
                waktu += 0.02; // Animasi napas pelan saat diam
            }

            // Animasi ayunan lengan otomatis saat bergerak/diam (Bobbing)
            if (manusia.userData.lenganKanan && manusia.userData.lenganKiri) {
                const ayunan = Math.sin(waktu) * (kecepatanJalan > 0 ? 0.3 : 0.03);
                manusia.userData.lenganKanan.rotation.x = 0.1 + ayunan;
                manusia.userData.lenganKiri.rotation.x = 0.1 - ayunan;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
