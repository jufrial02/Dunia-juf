<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dunia Juf</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #7ec0ee; }
        canvas { display: block; }
    </style>
</head>
<body>

    <script type="module">
        import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js';
        import { buatKarakterManusia } from './js/human_model/human_model.js';

        // 1. SETUP DASAR THREE.JS
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x7ec0ee); // Warna langit biru

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. CAHAYA (Agar bentuk 3D-nya kelihatan jelas)
        const cahayaAmbi = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(cahayaAmbi);
        const cahayaMatahari = new THREE.DirectionalLight(0xffffff, 0.6);
        cahayaMatahari.position.set(5, 10, 7);
        scene.add(cahayaMatahari);

        // 3. TANAH HIJAU SEMENTARA
        const geoTanah = new THREE.PlaneGeometry(100, 100);
        const matTanah = new THREE.MeshBasicMaterial({ color: 0x556b2f });
        const tanah = new THREE.Mesh(geoTanah, matTanah);
        tanah.rotation.x = -Math.PI / 2;
        scene.add(tanah);

        // 4. PANGGIL KARAKTER UTAMA DARI ES MODULES
        const karakterUtama = buatKarakterManusia();
        scene.add(karakterUtama);

        // Posisikan karakter agak mundur dan ke bawah sedikit agar pas di depan kamera
        karakterUtama.position.set(0, 0.5, -0.6);

        // Kamera melihat ke arah karakter
        camera.position.set(0, 0.8, 0);

        // 5. ANIMATION LOOP (Untuk merender layar terus-menerus)
        function animate() {
            requestAnimationFrame(animate);
            
            // Di sini nanti tempat kita naruh animasi jalan / gerak tangan
            
            renderer.render(scene, camera);
        }

        // Antisipasi perubahan ukuran layar HP (Rotasi layar)
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Jalankan dunianya!
        animate();
    </script>
</body>
</html>
